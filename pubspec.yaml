name: camera_app
description: "A new Flutter project"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.6.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.11.1
  camera_android: ^0.10.8+16
  camera_avfoundation: ^0.9.13+10
  camera_platform_interface: ^2.7.0
  path_provider: ^2.1.2
  path: ^1.8.3
  permission_handler: ^11.3.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  plugin:
    platforms:
      android:
        package: com.example.cameraly
        pluginClass: CameralyPlugin
      ios:
        pluginClass: CameralyPlugin 